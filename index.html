<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Aurora A La Carte</title>
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --green:    #00ff88;
      --purple:   #9955ff;
      --blue:     #44aaff;
      --gold:     #ffcc44;
      --panel-bg: rgba(2, 8, 28, 0.96);
      --border:   rgba(80, 200, 140, 0.22);
      --text:     #b0e8cc;
      --label:    rgba(140, 210, 175, 0.65);
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Georgia', serif;
      color: var(--text);
      touch-action: none;
      user-select: none;
    }

    #canvas-wrap {
      position: fixed; inset: 0; z-index: 0;
    }

    /* flash reveal */
    #flash {
      position: fixed; inset: 0; z-index: 5;
      background: radial-gradient(ellipse at 50% 35%, rgba(80,255,160,0.15), transparent 60%);
      pointer-events: none; opacity: 0;
      transition: opacity 0.08s;
    }
    #flash.on { opacity: 1; }

    /* aurora name */
    #aurora-name {
      position: fixed; top: 18px; left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      font-size: 1rem; letter-spacing: 0.13em;
      color: rgba(180,255,220,0.9);
      text-shadow: 0 0 22px rgba(0,255,120,0.5), 0 0 50px rgba(0,200,100,0.2);
      pointer-events: none; white-space: nowrap;
      opacity: 0; transition: opacity 1.2s ease;
    }
    #aurora-name.show { opacity: 1; }

    /* science tip */
    #science-tip {
      position: fixed; bottom: 10px; left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      font-size: 0.68rem; letter-spacing: 0.04em;
      color: rgba(130,200,170,0.6);
      max-width: 460px; text-align: center;
      line-height: 1.5;
      pointer-events: none;
      opacity: 0; transition: opacity 1.5s ease;
    }
    #science-tip.show { opacity: 1; }
    body.projection #science-tip { display: none; }

    /* toggle tab */
    #tab {
      position: fixed; bottom: 0; left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      background: var(--panel-bg);
      border: 1px solid var(--border); border-bottom: none;
      border-radius: 12px 12px 0 0;
      padding: 7px 22px 5px;
      font-size: 0.70rem; letter-spacing: 0.14em;
      color: var(--label); cursor: pointer;
      font-family: inherit;
      transition: color 0.2s;
    }
    #tab:active { color: var(--green); }

    /* panel */
    #panel {
      position: fixed; bottom: 0; left: 0; right: 0;
      z-index: 25;
      background: var(--panel-bg);
      border-top: 1px solid var(--border);
      padding: 16px 20px 24px;
      display: flex; flex-direction: column; gap: 13px;
      transform: translateY(100%);
      transition: transform 0.36s cubic-bezier(0.25,0.46,0.45,0.94);
    }
    #panel.open { transform: translateY(0); }

    .panel-head {
      display: flex; align-items: center; justify-content: space-between;
    }
    .panel-title {
      font-size: 1.2rem; letter-spacing: 0.06em;
      color: var(--green);
      text-shadow: 0 0 16px rgba(0,255,120,0.45);
    }
    .panel-sub {
      font-size: 0.65rem; letter-spacing: 0.07em;
      color: var(--label); margin-top: 2px;
    }

    #proj-btn {
      background: rgba(60,20,100,0.35);
      border: 1px solid rgba(153,85,255,0.4);
      border-radius: 18px;
      color: rgba(190,140,255,0.8);
      padding: 7px 14px;
      font-size: 0.76rem; letter-spacing: 0.05em;
      font-family: inherit; cursor: pointer;
      transition: all 0.2s;
    }
    #proj-btn:active {
      background: rgba(80,30,140,0.55);
      box-shadow: 0 0 18px rgba(153,85,255,0.35);
    }

    /* ingredient grid */
    .ingredients {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px 14px;
    }
    @media (max-width: 600px) {
      .ingredients { grid-template-columns: repeat(3, 1fr); }
    }

    .ingredient {
      display: flex; flex-direction: column;
      align-items: center; gap: 6px;
    }
    .ingredient .ing-icon {
      font-size: 1.5rem; line-height: 1;
    }
    .ingredient label {
      font-size: 0.60rem; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--label);
      text-align: center; line-height: 1.35;
    }
    .ingredient .val-lbl {
      font-size: 0.65rem; color: var(--text); min-height: 1em;
    }

    input[type="range"] {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 5px; border-radius: 3px;
      outline: none; cursor: pointer;
      background: rgba(255,255,255,0.08);
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px; height: 22px; border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 9px rgba(255,255,255,0.4);
      cursor: pointer;
    }
    input[type="range"].green  { accent-color: var(--green); }
    input[type="range"].purple { accent-color: var(--purple); }
    input[type="range"].blue   { accent-color: var(--blue); }
    input[type="range"].gold   { accent-color: var(--gold); }
    input[type="range"].white  { accent-color: #fff; }

    .solar-row { display: flex; gap: 5px; justify-content: center; }
    .sol-btn {
      width: 33px; height: 33px; border-radius: 50%;
      border: 2px solid rgba(255,200,60,0.18);
      background: rgba(255,180,0,0.05);
      color: rgba(255,200,60,0.28);
      font-size: 0.9rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.18s; font-family: inherit;
    }
    .sol-btn.lit {
      border-color: rgba(255,200,60,0.85);
      background: rgba(255,180,0,0.22);
      color: var(--gold);
      box-shadow: 0 0 11px rgba(255,180,0,0.32);
    }

    #bake-btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #071f14 0%, #0d3d23 100%);
      border: 1px solid rgba(0,255,120,0.3);
      border-radius: 11px;
      color: #7affb0; font-size: 1.02rem;
      letter-spacing: 0.08em; font-family: inherit;
      cursor: pointer;
      text-shadow: 0 0 11px rgba(0,255,100,0.35);
      box-shadow: 0 0 22px rgba(0,180,80,0.07);
      transition: all 0.18s;
    }
    #bake-btn:active {
      background: linear-gradient(135deg, #0d3d23 0%, #175e36 100%);
      box-shadow: 0 0 32px rgba(0,255,100,0.22);
    }

    /* projection overlay */
    #proj-overlay {
      position: fixed; inset: 0; z-index: 50;
      display: none; align-items: flex-end; justify-content: center;
      padding-bottom: 16px;
    }
    #proj-overlay.active { display: flex; }
    #proj-overlay-exit {
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px; color: rgba(255,255,255,0.25);
      padding: 7px 16px; font-size: 0.70rem;
      letter-spacing: 0.12em; cursor: pointer;
      font-family: inherit;
    }
  </style>
</head>
<body>

<div id="canvas-wrap"></div>
<div id="flash"></div>
<div id="aurora-name"></div>
<div id="science-tip"></div>

<button id="tab">&#9650; RECIPE</button>

<div id="panel">
  <div class="panel-head">
    <div>
      <div class="panel-title">Aurora A La Carte</div>
      <div class="panel-sub">Build your own northern lights</div>
    </div>
    <button id="proj-btn">&#128302; Projection Mode</button>
  </div>

  <div class="ingredients">

    <div class="ingredient" style="grid-column: span 2;">
      <div class="ing-icon">&#9728;&#65039;</div>
      <label>Solar Storm (Kp)</label>
      <div class="solar-row" id="solar-row">
        <button class="sol-btn lit" data-lv="1">1</button>
        <button class="sol-btn"     data-lv="2">2</button>
        <button class="sol-btn"     data-lv="3">3</button>
        <button class="sol-btn"     data-lv="4">4</button>
        <button class="sol-btn"     data-lv="5">5</button>
      </div>
      <div class="val-lbl" id="solar-label">Quiet</div>
    </div>

    <div class="ingredient">
      <div class="ing-icon" style="color:#44ff88; font-size:1.3rem; font-weight:bold;">O</div>
      <label>Oxygen<br><span style="font-size:0.52rem;opacity:0.7">Green &amp; Red</span></label>
      <input type="range" class="green" id="sl-oxygen"   min="0" max="100" value="75">
      <div class="val-lbl" id="val-oxygen">75%</div>
    </div>

    <div class="ingredient">
      <div class="ing-icon" style="color:#9955ff; font-size:1.3rem; font-weight:bold;">N</div>
      <label>Nitrogen<br><span style="font-size:0.52rem;opacity:0.7">Blue &amp; Purple</span></label>
      <input type="range" class="purple" id="sl-nitrogen" min="0" max="100" value="40">
      <div class="val-lbl" id="val-nitrogen">40%</div>
    </div>

    <div class="ingredient">
      <div class="ing-icon">&#127758;</div>
      <label>How Far<br>North?</label>
      <input type="range" class="gold" id="sl-latitude" min="40" max="85" value="65">
      <div class="val-lbl" id="val-latitude">65&deg;N</div>
    </div>

    <div class="ingredient">
      <div class="ing-icon">&#127769;</div>
      <label>Altitude<br><span style="font-size:0.52rem;opacity:0.7">100–300 km</span></label>
      <input type="range" class="blue" id="sl-altitude" min="0" max="100" value="50">
      <div class="val-lbl" id="val-altitude">Mid</div>
    </div>

  </div>

  <button id="bake-btn">&#127859; Bake My Aurora!</button>
</div>

<div id="proj-overlay">
  <button id="proj-overlay-exit">TAP TWICE TO EXIT</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/p5@1.9.3/lib/p5.min.js"></script>
<script>
// ── Live / target params ──────────────────────────────────
const live   = { solar:1, oxygen:0.75, nitrogen:0.40, latitude:65, altitude:0.50 };
const target = { ...live };

const solarLabels = ['','Quiet','Mild','Active','Strong!','EXTREME!'];
const scienceTips = [
  'Green aurora: oxygen atoms at ~150 km — the most common aurora color.',
  'Red aurora: oxygen atoms at ~300 km — needs a strong solar storm.',
  'Blue & purple: nitrogen molecules at ~100 km altitude.',
  'Aurora forms when solar wind particles follow Earth\'s magnetic field lines to the poles.',
  'Kp 5+ means the aurora may be visible from mid-latitudes!',
  'The further north you are, the more often you can see the aurora.',
  'Solar flares and coronal mass ejections (CMEs) create the most vivid displays.',
  'At very high altitudes, rare red auroras can appear at the very top of the curtain.',
];

function makeAuroraName(o, n, sol) {
  const G = ['Emerald','Jade','Verdant','Viridian'];
  const P = ['Amethyst','Violet','Indigo','Cosmic'];
  const R = ['Crimson','Scarlet','Carmine'];
  const M = ['Polar','Boreal','Celestial','Solar','Arctic'];
  const N = ['Cascade','Symphony','Veil','Curtain','Dreamscape','Tapestry','Wave'];
  const A = ['Grand','Radiant','Blazing','Gentle','Quiet','Vivid','Wild','Ethereal'];
  let color = o>0.70 && n<0.35 ? G[Math.random()*G.length|0]
            : n>0.65 && o<0.40 ? P[Math.random()*P.length|0]
            : o>0.55 && sol>=4 ? R[Math.random()*R.length|0]
            : M[Math.random()*M.length|0];
  return `The ${A[Math.random()*A.length|0]} ${color} ${N[Math.random()*N.length|0]}`;
}

// ── p5 sketch ─────────────────────────────────────────────
const sketch = (p) => {
  let t = 0;
  let buf;
  let aW, aH, aX, aY; // aurora buffer dimensions
  let stars = [];

  p.setup = () => {
    let cnv = p.createCanvas(window.innerWidth, window.innerHeight);
    cnv.parent('canvas-wrap');
    p.colorMode(p.HSB, 360, 100, 100, 100);
    initBuf();
    spawnStars();
  };

  // Aurora buffer fills the full viewport — mask handles the edge fade
  function initBuf() {
    aW = p.width;
    aH = p.height;
    aX = 0;
    aY = 0;
    if (buf) buf.remove();
    buf = p.createGraphics(aW, aH);
    buf.colorMode(p.HSB, 360, 100, 100, 100);
  }

  // Small white star dots
  function spawnStars() {
    stars = [];
    for (let i = 0; i < 260; i++) {
      stars.push({
        x: p.random(p.width),
        y: p.random(p.height * 0.85),
        r: p.random(0.3, 1.1),
        b: p.random(72, 100),
        phase: p.random(p.TWO_PI),
        spd:   p.random(0.007, 0.022),
      });
    }
  }

  p.draw = () => {
    for (let k in live) live[k] += (target[k] - live[k]) * 0.016;
    p.background(0, 0, 0);
    drawStars();
    drawBaseHorizonGlow();
    drawAurora();
    t++;
  };

  // ── Stars (small, sparse, visible through the aurora) ──────────────────
  function drawStars() {
    p.noStroke();
    for (let s of stars) {
      let tw = p.sin(t * s.spd + s.phase) * 9;
      let a  = p.constrain(45 + tw, 0, 100);
      p.fill(0, 0, s.b, a);
      p.circle(s.x, s.y, s.r);
    }
  }

  // ── Base crimson/orange horizon glow (Image 1: fire-like base) ─────────
  // Drawn directly on main canvas, behind the aurora buffer
  function drawBaseHorizonGlow() {
    let sol  = live.solar / 5;
    let lat  = p.map(live.latitude, 40, 85, 0.10, 1.0);
    let intens = sol * lat * live.oxygen;
    if (intens < 0.04) return;

    let pulse = 0.70 + 0.30 * p.sin(t * 0.006 + 0.5);
    let baseY = p.height * 0.72;
    let cx    = p.width  * 0.50;

    p.noStroke();
    p.blendMode(p.ADD);

    // Wide diffuse crimson base — "fire on the horizon"
    for (let i = 10; i >= 1; i--) {
      let r = i / 10;
      let a = (1 - r) * (1 - r) * intens * pulse * 22;
      // Colour shifts orange→crimson toward center
      let h = p.lerp(20, 4, r);
      p.fill(h, 88, 90, a);
      p.ellipse(cx, baseY, p.width * (0.30 + (1 - r) * 0.90),
                            p.height * (0.18 + (1 - r) * 0.55));
    }

    // Bright central hot-spot
    for (let i = 6; i >= 1; i--) {
      let r = i / 6;
      let a = (1 - r) * intens * pulse * 14;
      p.fill(28, 82, 95, a);
      p.ellipse(cx, baseY, p.width * (0.12 + (1 - r) * 0.25),
                            p.height * (0.06 + (1 - r) * 0.15));
    }

    p.blendMode(p.BLEND);
  }

  // ── Main aurora ────────────────────────────────────────────────────────
  function drawAurora() {
    let ox    = live.oxygen;
    let ni    = live.nitrogen;
    let sol   = live.solar / 5;
    let lat   = p.map(live.latitude, 40, 85, 0.10, 1.0);
    let alt   = live.altitude;
    let intens = sol * lat;

    // Slow organic breathing pulse
    let pulse = 0.70 + 0.30 * p.sin(t * 0.007 + p.sin(t * 0.003) * 2.0);

    buf.clear();

    if (intens >= 0.025) {
      // altShift raises/lowers the whole stack within the buffer
      let altShift = p.map(alt, 0, 1, 0.10, -0.08);

      // ── Band table ─────────────────────────────────────────────────────
      // [ hue, sat, bri, baseY(0–1 of aH), maxH(0–1 of aH),
      //   weight, noiseSpeed, noiseXScale ]
      //
      // Aurora spans from ~5 % top to ~85 % down the screen.
      // The bottom-most bands will be hidden by the horizon glow.
      const bands = [
        // Crimson wisps — very high altitude O (needs strong storm)
        [  4, 84, 88, 0.06+altShift, 0.08, ox*0.20*(sol>0.5?1:sol*2),       0.45, 0.00090],
        // Magenta/pink crown — high altitude O+N electric edge
        [328, 82, 92, 0.11+altShift, 0.09, (ox*0.38+ni*0.20)*(sol>0.25?1:sol*3), 0.55, 0.00100],
        // Yellow-green upper fringe
        [ 86, 90, 98, 0.17+altShift, 0.11, ox*0.58, 0.68, 0.00095],
        // ══ VIVID EMERALD GREEN — primary aurora (O at ~150 km) ══
        [132, 100,100, 0.24+altShift, 0.26, ox,      1.00, 0.00085],
        // Bright lime secondary fill
        [118,  96, 98, 0.42+altShift, 0.14, ox*0.52, 0.76, 0.00110],
        // ── Teal/cyan ribbon (Image 2: horizontal bands) ──
        [172,  92, 92, 0.52+altShift, 0.13, (ox*0.42+ni*0.52)*0.85, 0.80, 0.00120],
        // Electric blue — nitrogen lower curtain
        [218,  95, 90, 0.62+altShift, 0.11, ni,      0.85, 0.00115],
        // Deep violet hem — N ions at very low altitude
        [276,  88, 86, 0.70+altShift, 0.10, ni*0.72, 0.70, 0.00130],
      ];

      buf.blendMode(p.ADD);
      buf.noStroke();

      for (let [h, s, b, by, mh, w, spd, nxs] of bands) {
        let eff = w * intens * pulse;
        if (eff < 0.025) continue;
        drawBand(h, s, b, by * aH, mh * aH, eff, spd, nxs);
      }

      buf.blendMode(p.BLEND);
    }

    applyAuroraMask();

    // Subtle vertical float — fabric in a gentle breeze
    let dy = Math.sin(t * 0.0013 + 1.2) * 5;
    p.image(buf, aX, aY + dy);
  }

  // ── Band renderer ──────────────────────────────────────────────────────
  function drawBand(hue, sat, bri, baseY, maxH, weight, speed, nxs) {
    const STEP = 5;
    const sweepT = t * 0.0026;

    // Three passes: wide luminous halo → body → tight bright core
    const passes = [
      { sy: 1.85, sh: 1.55, af: 0.20 },
      { sy: 0.92, sh: 1.00, af: 0.50 },
      { sy: 0.38, sh: 0.46, af: 0.92 },
    ];

    for (let pass of passes) {
      let topPts = [];
      for (let x = -STEP * 2; x <= aW + STEP * 2; x += STEP) {
        // Three noise layers: grand roll + fine ripple + very slow drift
        let n1 = p.noise(x * nxs,            t * speed * 0.001);
        let n2 = p.noise(x * nxs * 3.2 + 400, t * speed * 0.0014);
        let n3 = p.noise(x * nxs * 0.35 + 900, t * speed * 0.00045);
        let y = baseY
              + (n1 - 0.5) * maxH * 2.50 * pass.sy
              + (n2 - 0.5) * maxH * 0.48 * pass.sy
              + (n3 - 0.5) * maxH * 0.16;
        topPts.push([x, y]);
      }

      // Sweeping brightness wave (aurora ripple effect)
      let sw1 = 0.5 + 0.5 * Math.sin((topPts[0][0] / aW) * Math.PI * 1.8 - sweepT);
      let sw2 = 0.5 + 0.5 * Math.sin((topPts[0][0] / aW) * Math.PI * 1.2 + sweepT * 0.65 + 1.3);
      let baseAlpha = weight * 62 * pass.af * (1 + 0.35 * (sw1 * 0.55 + sw2 * 0.45));

      buf.fill(hue, sat, bri, baseAlpha);
      buf.beginShape();
      for (let [x, y] of topPts) buf.curveVertex(x, y);
      for (let i = topPts.length - 1; i >= 0; i--) {
        let [x, y] = topPts[i];
        let nb = p.noise(x * nxs + 700, t * speed * 0.0008 + 50);
        buf.curveVertex(x, y + maxH * pass.sh + (nb - 0.5) * maxH * 0.30);
      }
      buf.endShape(p.CLOSE);
    }

    // ── CURTAIN RAYS with canvas shadow glow ────────────────────────────
    // Use the raw hue in 0-360° for the CSS shadow color
    let hDeg = hue;
    buf.drawingContext.shadowColor  = `hsl(${hDeg},100%,65%)`;
    buf.drawingContext.shadowBlur   = 10;

    for (let x = 0; x < aW; x += 4) {
      // Coarse fold noise groups rays into curtain bundles
      let fold = p.noise(x * 0.0048 + hue * 0.04, t * speed * 0.00075);
      let rn   = p.noise(x * 0.012  + hue * 0.11, t * speed * 0.0020);
      let foldBoost  = p.map(fold, 0.28, 0.70, 0, 1, true);
      let rayStrength = rn * foldBoost;
      if (rayStrength < 0.14) continue;

      // Ray base tracks the main band wave
      let yn  = p.noise(x * nxs, t * speed * 0.001);
      let yn2 = p.noise(x * nxs * 3.2 + 400, t * speed * 0.0014);
      let rayY = baseY
               + (yn  - 0.5) * maxH * 2.0
               + (yn2 - 0.5) * maxH * 0.38;

      // Taller rays → more sky coverage (Image 3)
      let rayH = rayStrength * maxH * weight * 1.80;
      let rayW = p.map(foldBoost, 0, 1, 0.9, 2.4);
      let baseA = weight * 80 * rayStrength;

      buf.strokeWeight(rayW);
      // Bright base segment
      buf.stroke(hue, sat, 100, baseA * 0.92);
      buf.line(x, rayY, x, rayY - rayH * 0.40);
      // Mid fade
      buf.stroke(hue, sat * 0.75, 100, baseA * 0.46);
      buf.line(x, rayY - rayH * 0.40, x, rayY - rayH * 0.75);
      // Wispy tip
      buf.stroke(hue, sat * 0.40, 100, baseA * 0.14);
      buf.line(x, rayY - rayH * 0.75, x, rayY - rayH);
    }

    // Reset shadow so it doesn't bleed into the mask step
    buf.drawingContext.shadowBlur  = 0;
    buf.drawingContext.shadowColor = 'transparent';
    buf.noStroke();
  }

  // ── Sky mask — fades at sides and bottom; open at top ──────────────────
  // Uses three linear gradients via destination-in so the aurora feels like
  // it fills a real sky rather than a blob.
  function applyAuroraMask() {
    let ctx = buf.drawingContext;
    ctx.save();
    ctx.globalCompositeOperation = 'destination-in';

    // Left fade (0 → 7 %)
    let gL = ctx.createLinearGradient(0, 0, aW * 0.09, 0);
    gL.addColorStop(0,   'rgba(0,0,0,0)');
    gL.addColorStop(1,   'rgba(0,0,0,1)');
    ctx.fillStyle = gL;
    ctx.fillRect(0, 0, aW * 0.09, aH);

    // Right fade (93 → 100 %)
    let gR = ctx.createLinearGradient(aW * 0.91, 0, aW, 0);
    gR.addColorStop(0,   'rgba(0,0,0,1)');
    gR.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle = gR;
    ctx.fillRect(aW * 0.91, 0, aW * 0.09, aH);

    // Opaque centre column (ensures no double-darken from the side fades)
    ctx.fillStyle = 'rgba(0,0,0,1)';
    ctx.fillRect(aW * 0.09, 0, aW * 0.82, aH * 0.78);

    // Bottom fade (72 → 100 %) — aurora dissolves into darkness / horizon glow
    let gB = ctx.createLinearGradient(0, aH * 0.70, 0, aH);
    gB.addColorStop(0,   'rgba(0,0,0,1)');
    gB.addColorStop(0.5, 'rgba(0,0,0,0.55)');
    gB.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle = gB;
    ctx.fillRect(0, aH * 0.70, aW, aH * 0.30);

    // Top — fully opaque strip so aurora reaches screen top
    ctx.fillStyle = 'rgba(0,0,0,1)';
    ctx.fillRect(aW * 0.09, 0, aW * 0.82, aH * 0.04);

    ctx.restore();
  }

  p.windowResized = () => {
    p.resizeCanvas(window.innerWidth, window.innerHeight);
    initBuf();
    spawnStars();
  };
};

new p5(sketch);

// ── UI: solar buttons ──────────────────────────────────────
let solarLevel = 1;
const solBtns     = document.querySelectorAll('.sol-btn');
const solarLabelEl = document.getElementById('solar-label');

solBtns.forEach(btn => btn.addEventListener('click', () => {
  solarLevel = parseInt(btn.dataset.lv);
  solBtns.forEach(b => b.classList.toggle('lit', parseInt(b.dataset.lv) <= solarLevel));
  solarLabelEl.textContent = solarLabels[solarLevel];
  target.solar = solarLevel;
}));

// ── UI: sliders (live feedback) ────────────────────────────
[
  { id:'sl-oxygen',   valId:'val-oxygen',   fmt:v=>Math.round(v)+'%',           key:'oxygen',   scale:v=>v/100 },
  { id:'sl-nitrogen', valId:'val-nitrogen', fmt:v=>Math.round(v)+'%',           key:'nitrogen', scale:v=>v/100 },
  { id:'sl-latitude', valId:'val-latitude', fmt:v=>Math.round(v)+'°N',          key:'latitude', scale:v=>parseFloat(v) },
  { id:'sl-altitude', valId:'val-altitude', fmt:v=>(v>75?'High (~280km)':v>45?'Mid (~150km)':'Low (~100km)'), key:'altitude', scale:v=>v/100 },
].forEach(({ id, valId, fmt, key, scale }) => {
  const sl = document.getElementById(id);
  const vl = document.getElementById(valId);
  const upd = () => { vl.textContent = fmt(sl.value); target[key] = scale(sl.value); };
  sl.addEventListener('input', upd);
  upd();
});

// ── UI: bake ───────────────────────────────────────────────
const flashEl  = document.getElementById('flash');
const nameEl   = document.getElementById('aurora-name');
const tipEl    = document.getElementById('science-tip');
let ntTimer, tipTimer;

document.getElementById('bake-btn').addEventListener('click', () => {
  target.solar = solarLevel;

  flashEl.classList.add('on');
  setTimeout(() => flashEl.classList.remove('on'), 160);

  clearTimeout(ntTimer);
  nameEl.classList.remove('show');
  setTimeout(() => {
    nameEl.textContent = makeAuroraName(target.oxygen, target.nitrogen, target.solar);
    nameEl.classList.add('show');
    ntTimer = setTimeout(() => nameEl.classList.remove('show'), 7000);
  }, 200);

  clearTimeout(tipTimer);
  tipEl.classList.remove('show');
  setTimeout(() => {
    tipEl.textContent = scienceTips[Math.random() * scienceTips.length | 0];
    tipEl.classList.add('show');
    tipTimer = setTimeout(() => tipEl.classList.remove('show'), 9000);
  }, 550);
});

// ── UI: panel toggle ───────────────────────────────────────
const panel  = document.getElementById('panel');
const tabBtn = document.getElementById('tab');
let panelOpen = false;

tabBtn.addEventListener('click', () => {
  panelOpen = !panelOpen;
  panel.classList.toggle('open', panelOpen);
  tabBtn.textContent = panelOpen ? '▼ HIDE RECIPE' : '▲ RECIPE';
});

// ── UI: projection mode ────────────────────────────────────
const projOverlay = document.getElementById('proj-overlay');
document.getElementById('proj-btn').addEventListener('click', () => {
  panel.classList.remove('open'); panelOpen = false;
  tabBtn.textContent = '▲ RECIPE';
  tabBtn.style.display = 'none';
  projOverlay.classList.add('active');
});
document.getElementById('proj-overlay-exit').addEventListener('click', exitProj);

let lastTap = 0;
document.getElementById('canvas-wrap').addEventListener('touchend', () => {
  const now = Date.now();
  if (now - lastTap < 380 && projOverlay.classList.contains('active')) exitProj();
  lastTap = now;
});

function exitProj() {
  projOverlay.classList.remove('active');
  tabBtn.style.display = '';
}
</script>
