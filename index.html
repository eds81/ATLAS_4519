<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Aurora A La Carte</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    :root {
      --green:    #00ff88;
      --purple:   #9955ff;
      --blue:     #44aaff;
      --gold:     #ffcc44;
      --panel-bg: rgba(2,8,28,0.96);
      --border:   rgba(80,200,140,0.22);
      --text:     #b0e8cc;
      --label:    rgba(140,210,175,0.65);
    }
    html, body { width:100%; height:100%; overflow:hidden; background:#000; font-family:'Georgia',serif; color:var(--text); touch-action:none; user-select:none; }
    canvas { display:block; position:fixed; inset:0; z-index:0; }

    #flash { position:fixed; inset:0; z-index:5; background:radial-gradient(ellipse at 50% 35%, rgba(80,255,160,0.18), transparent 60%); pointer-events:none; opacity:0; transition:opacity 0.08s; }
    #flash.on { opacity:1; }

    #aurora-name { position:fixed; top:18px; left:50%; transform:translateX(-50%); z-index:20; font-size:1rem; letter-spacing:0.13em; color:rgba(180,255,220,0.9); text-shadow:0 0 22px rgba(0,255,120,0.5),0 0 50px rgba(0,200,100,0.2); pointer-events:none; white-space:nowrap; opacity:0; transition:opacity 1.2s ease; }
    #aurora-name.show { opacity:1; }

    #science-tip { position:fixed; bottom:10px; left:50%; transform:translateX(-50%); z-index:20; font-size:0.68rem; letter-spacing:0.04em; color:rgba(130,200,170,0.6); max-width:460px; text-align:center; line-height:1.5; pointer-events:none; opacity:0; transition:opacity 1.5s ease; }
    #science-tip.show { opacity:1; }

    #tab { position:fixed; bottom:0; left:50%; transform:translateX(-50%); z-index:30; background:var(--panel-bg); border:1px solid var(--border); border-bottom:none; border-radius:12px 12px 0 0; padding:7px 22px 5px; font-size:0.70rem; letter-spacing:0.14em; color:var(--label); cursor:pointer; font-family:inherit; transition:color 0.2s; }
    #tab:active { color:var(--green); }

    #panel { position:fixed; bottom:0; left:0; right:0; z-index:25; background:var(--panel-bg); border-top:1px solid var(--border); padding:16px 20px 24px; display:flex; flex-direction:column; gap:13px; transform:translateY(100%); transition:transform 0.36s cubic-bezier(0.25,0.46,0.45,0.94); }
    #panel.open { transform:translateY(0); }
    .panel-head { display:flex; align-items:center; justify-content:space-between; }
    .panel-title { font-size:1.2rem; letter-spacing:0.06em; color:var(--green); text-shadow:0 0 16px rgba(0,255,120,0.45); }
    .panel-sub { font-size:0.65rem; letter-spacing:0.07em; color:var(--label); margin-top:2px; }

    #proj-btn { background:rgba(60,20,100,0.35); border:1px solid rgba(153,85,255,0.4); border-radius:18px; color:rgba(190,140,255,0.8); padding:7px 14px; font-size:0.76rem; letter-spacing:0.05em; font-family:inherit; cursor:pointer; transition:all 0.2s; }
    #proj-btn:active { background:rgba(80,30,140,0.55); box-shadow:0 0 18px rgba(153,85,255,0.35); }

    .ingredients { display:grid; grid-template-columns:repeat(5,1fr); gap:10px 14px; }
    @media(max-width:600px){ .ingredients{grid-template-columns:repeat(3,1fr);} }
    .ingredient { display:flex; flex-direction:column; align-items:center; gap:6px; }
    .ingredient .ing-icon { font-size:1.5rem; line-height:1; }
    .ingredient label { font-size:0.60rem; letter-spacing:0.08em; text-transform:uppercase; color:var(--label); text-align:center; line-height:1.35; }
    .ingredient .val-lbl { font-size:0.65rem; color:var(--text); min-height:1em; }

    input[type="range"] { -webkit-appearance:none; appearance:none; width:100%; height:5px; border-radius:3px; outline:none; cursor:pointer; background:rgba(255,255,255,0.08); }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance:none; width:22px; height:22px; border-radius:50%; background:#fff; box-shadow:0 0 9px rgba(255,255,255,0.4); cursor:pointer; }
    input[type="range"].green  { accent-color:var(--green); }
    input[type="range"].purple { accent-color:var(--purple); }
    input[type="range"].gold   { accent-color:var(--gold); }
    input[type="range"].blue   { accent-color:var(--blue); }

    .solar-row { display:flex; gap:5px; justify-content:center; }
    .sol-btn { width:33px; height:33px; border-radius:50%; border:2px solid rgba(255,200,60,0.18); background:rgba(255,180,0,0.05); color:rgba(255,200,60,0.28); font-size:0.9rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.18s; font-family:inherit; }
    .sol-btn.lit { border-color:rgba(255,200,60,0.85); background:rgba(255,180,0,0.22); color:var(--gold); box-shadow:0 0 11px rgba(255,180,0,0.32); }

    #bake-btn { width:100%; padding:14px; background:linear-gradient(135deg,#071f14 0%,#0d3d23 100%); border:1px solid rgba(0,255,120,0.3); border-radius:11px; color:#7affb0; font-size:1.02rem; letter-spacing:0.08em; font-family:inherit; cursor:pointer; text-shadow:0 0 11px rgba(0,255,100,0.35); box-shadow:0 0 22px rgba(0,180,80,0.07); transition:all 0.18s; }
    #bake-btn:active { background:linear-gradient(135deg,#0d3d23 0%,#175e36 100%); box-shadow:0 0 32px rgba(0,255,100,0.22); }
    .btn-row { display:flex; gap:10px; }
    .btn-row #bake-btn { flex:1; }
    #print-btn { padding:14px 18px; background:linear-gradient(135deg,#0d0a1e 0%,#1a0e3a 100%); border:1px solid rgba(153,85,255,0.35); border-radius:11px; color:rgba(190,150,255,0.88); font-size:0.82rem; letter-spacing:0.07em; font-family:inherit; cursor:pointer; white-space:nowrap; text-shadow:0 0 10px rgba(130,80,255,0.3); box-shadow:0 0 18px rgba(100,50,200,0.06); transition:all 0.18s; }
    #print-btn:active { background:linear-gradient(135deg,#1a0e3a 0%,#2a1560 100%); box-shadow:0 0 28px rgba(150,80,255,0.22); }

    #proj-overlay { position:fixed; inset:0; z-index:50; display:none; align-items:flex-end; justify-content:center; padding-bottom:16px; }
    #proj-overlay.active { display:flex; }
    #proj-overlay-exit { background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.1); border-radius:18px; color:rgba(255,255,255,0.25); padding:7px 16px; font-size:0.70rem; letter-spacing:0.12em; cursor:pointer; font-family:inherit; }
  </style>
</head>
<body>

<canvas id="c"></canvas>
<div id="flash"></div>
<div id="aurora-name"></div>
<div id="science-tip"></div>
<button id="tab">&#9650; RECIPE</button>

<div id="panel">
  <div class="panel-head">
    <div>
      <div class="panel-title">Aurora A La Carte</div>
      <div class="panel-sub">Build your own northern lights</div>
    </div>
    <button id="proj-btn">&#128302; Projection Mode</button>
  </div>

  <div class="ingredients">
    <div class="ingredient" style="grid-column:span 2;">
      <div class="ing-icon">&#9728;&#65039;</div>
      <label>Solar Storm (Kp)</label>
      <div class="solar-row" id="solar-row">
        <button class="sol-btn lit" data-lv="1">1</button>
        <button class="sol-btn"     data-lv="2">2</button>
        <button class="sol-btn"     data-lv="3">3</button>
        <button class="sol-btn"     data-lv="4">4</button>
        <button class="sol-btn"     data-lv="5">5</button>
      </div>
      <div class="val-lbl" id="solar-label">Quiet</div>
    </div>

    <div class="ingredient">
      <div class="ing-icon" style="color:#44ff88;font-size:1.3rem;font-weight:bold;">O</div>
      <label>Oxygen<br><span style="font-size:0.52rem;opacity:0.7">Green &amp; Red</span></label>
      <input type="range" class="green" id="sl-oxygen"   min="0" max="100" value="75">
      <div class="val-lbl" id="val-oxygen">75%</div>
    </div>

    <div class="ingredient">
      <div class="ing-icon" style="color:#9955ff;font-size:1.3rem;font-weight:bold;">N</div>
      <label>Nitrogen<br><span style="font-size:0.52rem;opacity:0.7">Blue &amp; Purple</span></label>
      <input type="range" class="purple" id="sl-nitrogen" min="0" max="100" value="40">
      <div class="val-lbl" id="val-nitrogen">40%</div>
    </div>

    <div class="ingredient">
      <div class="ing-icon">&#127758;</div>
      <label>How Far North?</label>
      <input type="range" class="gold" id="sl-latitude"  min="40" max="85" value="65">
      <div class="val-lbl" id="val-latitude">65&deg;N</div>
    </div>

    <div class="ingredient">
      <div class="ing-icon">&#127769;</div>
      <label>Altitude<br><span style="font-size:0.52rem;opacity:0.7">100–300 km</span></label>
      <input type="range" class="blue" id="sl-altitude"  min="0" max="100" value="50">
      <div class="val-lbl" id="val-altitude">Mid</div>
    </div>
  </div>

  <div class="btn-row">
    <button id="bake-btn">&#127859; Bake My Aurora!</button>
    <button id="print-btn">&#128438; Print Recipe Card</button>
  </div>
</div>

<div id="proj-overlay">
  <button id="proj-overlay-exit">TAP TWICE TO EXIT</button>
</div>

<script>
// ── live params ───────────────────────────────────────────
const live   = { solar:1, oxygen:0.75, nitrogen:0.40, latitude:65, altitude:0.50 };
const target = { ...live };
function lerpParams() {
  for (const k in live) live[k] += (target[k] - live[k]) * 0.016;
}

// ── canvas ────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H;
let auroraCanvas = null, auroraCtx = null;
function ensureOffscreen() {
  if (!auroraCanvas || auroraCanvas.width !== W || auroraCanvas.height !== H) {
    auroraCanvas = document.createElement('canvas');
    auroraCanvas.width = W; auroraCanvas.height = H;
    auroraCtx = auroraCanvas.getContext('2d');
  }
}

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  spawnStars();
}
window.addEventListener('resize', resize);

// ── stars ─────────────────────────────────────────────────
let stars = [];
function spawnStars() {
  stars = [];
  for (let i = 0; i < 180; i++) {
    stars.push({
      x:  Math.random() * W,
      y:  Math.random() * H,
      r:  Math.random() * 0.6 + 0.3,
      a:  Math.random() * 0.4 + 0.3,
      tw: Math.random() * Math.PI * 2
    });
  }
}
function drawStars(t) {
  for (const s of stars) {
    const tw = 0.7 + 0.3 * Math.sin(t * 0.0007 + s.tw);
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${(s.a * tw).toFixed(3)})`;
    ctx.fill();
  }
}

// ── ribbon-based aurora — horizontal wavy curtains ────────
const R = () => Math.random();
const RIBBON_DEPTHS = [1.00, 0.68, 0.45, 0.28, 0.15];

const RIBBONS = [
  0.40, 0.32, 0.50, 0.24, 0.58
].map((baseY, i) => ({
  baseY,
  idx: i,
  depth: RIBBON_DEPTHS[i],
  w: [
    { A: 0.058 + R()*0.028, f: 0.7 + R()*0.4,  sp: 0.000150 + R()*0.000055, ph: R()*6.28 },
    { A: 0.022 + R()*0.012, f: 1.6 + R()*0.6,  sp: 0.000085 + R()*0.000032, ph: R()*6.28 },
  ],
  driftV:   0,
  driftVel: (R()-0.5) * 0.000012,
}));

let lastMs     = 0;
let sharedDrift = 0;

function updateRibbons(ms) {
  const dt = Math.min(ms - lastMs, 50);
  lastMs = ms;
  if (dt <= 0) return;

  sharedDrift += 0.000085 * dt;

  for (const r of RIBBONS) {
    r.driftVel += (R()-0.5) * 0.00000012 * dt;
    r.driftVel *= Math.pow(0.9978, dt);
    r.driftVel  = Math.max(-0.000020, Math.min(0.000020, r.driftVel));
    r.driftV   += r.driftVel * dt;
    r.driftV    = Math.max(-0.055, Math.min(0.055, r.driftV));
  }
}

function ribbonY(r, xFrac, t) {
  let y = r.baseY + r.driftV;
  const speedMult  = 0.45 + 0.80 * r.depth;
  const driftMult  = 0.10 + 0.45 * r.depth;
  for (const w of r.w) {
    y += w.A * Math.sin(xFrac * w.f * Math.PI * 2 + t * w.sp * speedMult + w.ph + sharedDrift * driftMult);
  }
  return y;
}

// ── blob definitions ──────────────────────────────────────
const BLOB_DEFS = [
  { r:0,   g:255, b:102,  rHead:270, rPerp:115, ox:0,    oy:0,    spd:0.000095, ph:0.00, baseOpacity:0.90, gas:'O', flickF:0.000140, flickP:0.00 },
  { r:30,  g:255, b:80,   rHead:210, rPerp:88,  ox:90,   oy:-55,  spd:0.000080, ph:1.10, baseOpacity:0.75, gas:'O', flickF:0.000110, flickP:2.10 },
  { r:0,   g:255, b:200,  rHead:230, rPerp:95,  ox:-100, oy:40,   spd:0.000065, ph:2.30, baseOpacity:0.60, gas:'O', flickF:0.000085, flickP:1.40 },
  { r:255, g:60,  b:80,   rHead:155, rPerp:68,  ox:110,  oy:75,   spd:0.000105, ph:0.80, baseOpacity:0.32, gas:'O', flickF:0.000175, flickP:3.80 },
  { r:40,  g:100, b:255,  rHead:215, rPerp:88,  ox:-80,  oy:-80,  spd:0.000088, ph:3.50, baseOpacity:0.82, gas:'N', flickF:0.000155, flickP:0.70 },
  { r:200, g:0,   b:255,  rHead:195, rPerp:80,  ox:120,  oy:-25,  spd:0.000072, ph:1.80, baseOpacity:0.72, gas:'N', flickF:0.000125, flickP:2.50 },
  { r:140, g:30,  b:255,  rHead:165, rPerp:68,  ox:-110, oy:70,   spd:0.000092, ph:2.90, baseOpacity:0.65, gas:'N', flickF:0.000100, flickP:1.20 },
  { r:180, g:80,  b:255,  rHead:135, rPerp:55,  ox:50,   oy:-100, spd:0.000078, ph:4.10, baseOpacity:0.55, gas:'N', flickF:0.000180, flickP:3.30 },
];

const TAIL_DEFS = [
  { r:0,   g:255, b:120, dist:200, rHead:180, rPerp:55, opacity:0.38, blur:70,  gas:'O', wA:55,  wF:0.000240, wP:0.00 },
  { r:0,   g:200, b:255, dist:360, rHead:140, rPerp:42, opacity:0.22, blur:80,  gas:'O', wA:80,  wF:0.000185, wP:1.40 },
  { r:100, g:0,   b:255, dist:520, rHead:110, rPerp:32, opacity:0.14, blur:90,  gas:'N', wA:100, wF:0.000150, wP:2.70 },
  { r:60,  g:0,   b:200, dist:680, rHead:80,  rPerp:24, opacity:0.07, blur:105, gas:'N', wA:120, wF:0.000120, wP:0.90 },
];

// ── helper: draw one elongated blob ──────────────────────
function drawBlob(actx, x, y, rHead, rPerp, angle, r, g, b, eff) {
  if (eff < 0.005) return;
  actx.save();
  actx.globalAlpha = eff;
  actx.translate(x, y);
  actx.rotate(angle);
  actx.scale(1, rPerp / rHead);
  const grad = actx.createRadialGradient(0, 0, 0, 0, 0, rHead);
  grad.addColorStop(0,    `rgba(${r},${g},${b},0.72)`);
  grad.addColorStop(0.28, `rgba(${r},${g},${b},0.42)`);
  grad.addColorStop(0.55, `rgba(${r},${g},${b},0.16)`);
  grad.addColorStop(0.78, `rgba(${r},${g},${b},0.04)`);
  grad.addColorStop(1,    `rgba(${r},${g},${b},0)`);
  actx.beginPath();
  actx.arc(0, 0, rHead, 0, Math.PI * 2);
  actx.fillStyle = grad;
  actx.fill();
  actx.restore();
}

// ── draw one ribbon (horizontal wavy curtain) ─────────────
const RIBBON_STEPS = 18;

function drawOneRibbon(ribbon, t, intens, altScale) {
  const breath = 0.88 + 0.12 * Math.sin(t * 0.000380 + ribbon.idx * 1.4);
  const depthScale   = 0.45 + 0.70 * ribbon.depth;
  const opacityDepth = 0.30 + 0.80 * ribbon.depth;
  const rH = W * 0.11 * altScale * depthScale;
  const rP = H * 0.15 * altScale * depthScale;

  for (let i = 0; i < RIBBON_STEPS; i++) {
    const xFrac  = i         / (RIBBON_STEPS - 1);
    const xFracN = (i + 0.5) / (RIBBON_STEPS - 1);

    const y0 = ribbonY(ribbon, xFrac,  t);
    const y1 = ribbonY(ribbon, xFracN, t);

    const cx  = xFrac * W;
    const cy  = y0 * H;
    const angle = Math.atan2((y1 - y0) * H, xFracN * W - xFrac * W);

    const edgeZone = 0.18;
    const rawFade  = Math.min(xFrac / edgeZone, 1) * Math.min((1 - xFrac) / edgeZone, 1);
    const edgeFade = rawFade * rawFade * (3 - 2 * rawFade);

    const shimmer = 0.52
      + 0.30 * Math.sin(t * 0.000095 + xFrac * 6.1 + ribbon.idx * 2.3)
      + 0.18 * Math.sin(t * 0.000067 + xFrac * 10.4 + ribbon.idx * 1.7);
    const s = Math.max(0, shimmer);

    const oEff = live.oxygen   * intens * breath * s * edgeFade * opacityDepth;
    const nEff = live.nitrogen * intens * breath * s * edgeFade * opacityDepth * 0.85;

    const yUp   = cy - rP * 0.45;
    const yDown = cy + rP * 0.45;

    if (oEff > 0.01) {
      drawBlob(auroraCtx, cx, cy,    rH,        rP,        angle, 0,  255, 102, oEff * 0.55);
      drawBlob(auroraCtx, cx, yUp,   rH * 0.70, rP * 0.70, angle, 0,  255, 120, oEff * 0.38);
      drawBlob(auroraCtx, cx, yDown, rH * 0.65, rP * 0.65, angle, 30, 255, 80,  oEff * 0.32);
    }

    if (nEff > 0.01) {
      drawBlob(auroraCtx, cx, yDown,           rH * 0.72, rP * 0.72, angle, 40,  100, 255, nEff * 0.45);
      drawBlob(auroraCtx, cx, cy + rP * 0.65,  rH * 0.45, rP * 0.45, angle, 160, 40,  255, nEff * 0.50);
    }

    const redEff = intens * live.oxygen * breath * edgeFade * Math.max(0, (live.altitude - 0.45) * 2.0) * 0.25;
    if (redEff > 0.01) {
      drawBlob(auroraCtx, cx, yUp - rP * 0.35, rH * 0.48, rP * 0.48, angle, 255, 50, 70, redEff * 0.38);
    }
  }
}

// ── draw all active auroras ───────────────────────────────
function drawAurora(t) {
  ensureOffscreen();
  auroraCtx.clearRect(0, 0, W, H);
  auroraCtx.globalCompositeOperation = 'screen';

  const solNorm  = (live.solar - 1) / 4;
  const latF     = Math.max(0.10, Math.min(1, (live.latitude - 40) / 45));
  const intens   = (0.28 + solNorm * 0.72) * latF;
  const altScale = 0.85 + live.altitude * 0.30;
  const count    = Math.round(live.solar);

  for (let i = 0; i < count; i++) {
    drawOneRibbon(RIBBONS[i], t, intens, altScale);
  }

  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  ctx.filter = 'blur(52px)';
  ctx.drawImage(auroraCanvas, 0, 0);
  ctx.restore();

  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  ctx.filter = 'blur(12px)';
  ctx.globalAlpha = 0.50;
  ctx.drawImage(auroraCanvas, 0, 0);
  ctx.restore();
}

// ── main loop ─────────────────────────────────────────────
function loop(ms) {
  lerpParams();
  updateRibbons(ms);
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, W, H);
  drawStars(ms);
  drawAurora(ms);
  requestAnimationFrame(loop);
}

resize();
requestAnimationFrame(loop);

// ── science & names ───────────────────────────────────────
const solarLabels = ['','Quiet','Mild','Active','Strong!','EXTREME!'];
const scienceTips = [
  'Green aurora: oxygen atoms at ~150 km — the most common aurora color.',
  'Red aurora: oxygen atoms at ~300 km — needs a strong solar storm.',
  'Blue & purple: nitrogen molecules at ~100 km altitude.',
  'Aurora forms when solar wind particles follow Earth\'s magnetic field lines to the poles.',
  'Kp 5+ means aurora may be visible from mid-latitudes!',
  'The further north you are, the more often you can see the aurora.',
  'Solar flares and coronal mass ejections (CMEs) create the most vivid displays.',
  'At high altitude, rare red auroras appear at the very top of the curtain.',
  'Earth\'s magnetic field funnels charged particles toward the poles.',
  'The solar cycle is 11 years long, but scientists still don\'t fully understand why.',
];

function makeAuroraName(o, n, sol) {
  const G = ['Emerald','Jade','Verdant','Viridian'];
  const P = ['Amethyst','Violet','Indigo','Cosmic'];
  const Red = ['Crimson','Scarlet','Carmine','Ruby'];
  const M = ['Polar','Boreal','Celestial','Solar','Arctic'];
  const N = ['Cascade','Symphony','Veil','Curtain','Dreamscape','Tapestry','Wave','Ribbon'];
  const A = ['Grand','Radiant','Blazing','Gentle','Quiet','Vivid','Wild','Ethereal'];
  const col = o>0.70 && n<0.35 ? G[Math.random()*G.length|0]
            : n>0.65 && o<0.40 ? P[Math.random()*P.length|0]
            : o>0.55 && sol>=4  ? Red[Math.random()*Red.length|0]
            : M[Math.random()*M.length|0];
  return `The ${A[Math.random()*A.length|0]} ${col} ${N[Math.random()*N.length|0]}`;
}

// ── UI: solar buttons ─────────────────────────────────────
let solarLevel = 1;
const solBtns      = document.querySelectorAll('.sol-btn');
const solarLabelEl = document.getElementById('solar-label');
solBtns.forEach(btn => btn.addEventListener('click', () => {
  solarLevel = parseInt(btn.dataset.lv);
  solBtns.forEach(b => b.classList.toggle('lit', parseInt(b.dataset.lv) <= solarLevel));
  solarLabelEl.textContent = solarLabels[solarLevel];
  target.solar = solarLevel;
}));

// ── UI: sliders ───────────────────────────────────────────
[
  { id:'sl-oxygen',   valId:'val-oxygen',   fmt:v=>Math.round(v)+'%',  key:'oxygen',   scale:v=>v/100 },
  { id:'sl-nitrogen', valId:'val-nitrogen', fmt:v=>Math.round(v)+'%',  key:'nitrogen', scale:v=>v/100 },
  { id:'sl-latitude', valId:'val-latitude', fmt:v=>Math.round(v)+'°N', key:'latitude', scale:v=>parseFloat(v) },
  { id:'sl-altitude', valId:'val-altitude', fmt:v=>v>75?'High (~280km)':v>45?'Mid (~150km)':'Low (~100km)', key:'altitude', scale:v=>v/100 },
].forEach(({ id, valId, fmt, key, scale }) => {
  const sl = document.getElementById(id), vl = document.getElementById(valId);
  const upd = () => { vl.textContent = fmt(sl.value); target[key] = scale(sl.value); };
  sl.addEventListener('input', upd); upd();
});

// ── UI: bake ──────────────────────────────────────────────
const flashEl = document.getElementById('flash');
const nameEl  = document.getElementById('aurora-name');
const tipEl   = document.getElementById('science-tip');
let ntTimer, tipTimer;

document.getElementById('bake-btn').addEventListener('click', () => {
  target.solar = solarLevel;
  flashEl.classList.add('on');
  setTimeout(() => flashEl.classList.remove('on'), 160);
  clearTimeout(ntTimer); nameEl.classList.remove('show');
  setTimeout(() => {
    nameEl.textContent = makeAuroraName(target.oxygen, target.nitrogen, target.solar);
    nameEl.classList.add('show');
    ntTimer = setTimeout(() => nameEl.classList.remove('show'), 7000);
  }, 200);
  clearTimeout(tipTimer); tipEl.classList.remove('show');
  setTimeout(() => {
    tipEl.textContent = scienceTips[Math.random()*scienceTips.length|0];
    tipEl.classList.add('show');
    tipTimer = setTimeout(() => tipEl.classList.remove('show'), 9000);
  }, 550);
});

// ── UI: print recipe card (POST to server) ────────────────
document.getElementById('print-btn').addEventListener('click', async () => {
  const payload = {
    oxygen:    Math.round(live.oxygen * 100),
    nitrogen:  Math.round(live.nitrogen * 100),
    solar:     Math.round(live.solar),
    latitude:  Math.round(live.latitude),
    altitude:  Math.round(live.altitude * 100)
  };

  try {
    const res = await fetch("http://172.20.10.6:3000/print", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    console.log("🖨️ Printer response:", data);
    alert("Sent to printer!");
  } catch (err) {
    console.error("❌ Print failed:", err);
    alert("Print failed (check server)");
  }
});

// ── UI: panel toggle ──────────────────────────────────────
const panel  = document.getElementById('panel');
const tabBtn = document.getElementById('tab');
let panelOpen = false;
tabBtn.addEventListener('click', () => {
  panelOpen = !panelOpen;
  panel.classList.toggle('open', panelOpen);
  tabBtn.textContent = panelOpen ? '▼ HIDE RECIPE' : '▲ RECIPE';
});

// ── UI: projection mode ───────────────────────────────────
const projOverlay = document.getElementById('proj-overlay');
document.getElementById('proj-btn').addEventListener('click', () => {
  panel.classList.remove('open'); panelOpen = false;
  tabBtn.textContent = '▲ RECIPE';
  tabBtn.style.display = 'none';
  projOverlay.classList.add('active');
});
document.getElementById('proj-overlay-exit').addEventListener('click', exitProj);
let lastTap = 0;
canvas.addEventListener('touchend', () => {
  const now = Date.now();
  if (now - lastTap < 380 && projOverlay.classList.contains('active')) exitProj();
  lastTap = now;
});
function exitProj() { projOverlay.classList.remove('active'); tabBtn.style.display = ''; }
</script>

<!-- ── ESP32 WebSocket ─────────────────────────────────── -->
<script>
  const ws = new WebSocket("ws://172.20.10.7:81");

  ws.onopen = () => {
    console.log("ESP32 CONNECTED");
  };

  ws.onmessage = (event) => {
    try {
      const data = JSON.parse(event.data);

      if (data.oxygen !== undefined) {
        target.oxygen = data.oxygen / 100;
        document.getElementById('sl-oxygen').value = data.oxygen;
        document.getElementById('val-oxygen').textContent = data.oxygen + "%";
      }

      if (data.nitrogen !== undefined) {
        target.nitrogen = data.nitrogen / 100;
        document.getElementById('sl-nitrogen').value = data.nitrogen;
        document.getElementById('val-nitrogen').textContent = data.nitrogen + "%";
      }

      if (data.solar !== undefined) {
        target.solar = data.solar;
        solarLevel = data.solar;
        document.querySelectorAll('.sol-btn').forEach(b => {
          b.classList.toggle('lit', parseInt(b.dataset.lv) <= solarLevel);
        });
        document.getElementById('solar-label').textContent =
          ['','Quiet','Mild','Active','Strong!','EXTREME!'][solarLevel];
      }

      if (data.latitude !== undefined) {
        target.latitude = data.latitude;
        document.getElementById('sl-latitude').value = data.latitude;
        document.getElementById('val-latitude').textContent =
          Math.round(data.latitude) + "°N";
      }

      if (data.altitude !== undefined) {
        target.altitude = data.altitude / 100;
        document.getElementById('sl-altitude').value = data.altitude;
        const label =
          data.altitude > 75 ? "High (~280km)" :
          data.altitude > 45 ? "Mid (~150km)" :
          "Low (~100km)";
        document.getElementById('val-altitude').textContent = label;
      }

      if (data.event === "button_press") {
        const auroraName = document.getElementById('aurora-name').textContent ||
                           makeAuroraName(live.oxygen, live.nitrogen, live.solar);

        document.getElementById('bake-btn').click();

        fetch("http://172.20.10.6:3000/print", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            oxygen:    Math.round(live.oxygen * 100),
            nitrogen:  Math.round(live.nitrogen * 100),
            solar:     Math.round(live.solar),
            latitude:  Math.round(live.latitude),
            altitude:  Math.round(live.altitude * 100),
            auroraName: auroraName
          })
        })
        .then(r => r.json())
        .then(d => console.log("🖨️ Printed!", d))
        .catch(e => console.error("❌ Print failed:", e));
      }

    } catch (e) {
      console.log("bad json:", event.data);
    }
  };
</script>
